name: Build Windows x86-64 EXE

on:
  push:
    tags:
      - 'v*'           # 打 tag（如 v1.0.0）时自动触发
  workflow_dispatch:   # 支持手动触发

jobs:
  build:
    runs-on: windows-latest   # GitHub 托管的 Windows Server x64 Runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: pyinstaller build.spec

      - name: Verify output
        run: |
          dir dist\
          if not exist "dist\AzureAISpeechDemo.exe" (
            echo "ERROR: EXE not found"
            exit 1
          )

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: AzureAISpeechDemo-Windows-x64-${{ github.ref_name }}
          path: dist/AzureAISpeechDemo.exe
          retention-days: 30   # artifact 保留 30 天

      - name: Create GitHub Release (on tag only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/AzureAISpeechDemo.exe
          generate_release_notes: true
